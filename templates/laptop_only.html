{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Available on Computer</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="{% static 'zoom_logo.webp' %}">
  <style>
    body{
      font-family: Arial, Helvetica, sans-serif;
      background:#f3f3f3;
      text-align:center;
      padding-top:80px;
      color:#333;
      margin:0;
    }
    h1{
      color:#1a73b8;
      font-size:34px;
      margin-bottom:20px;
    }
    p{
      font-size:20px;
      margin:8px 0;
    }
    .logo{
      width: 200px;
      height: 100%;
      object-fit: contain;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <img class="logo" src="{% static 'zoom_logo.webp' %}" alt="Zoom Logo">
  <h1>Only available on computer</h1>
  <p>This installer is not available on mobile or tablet devices.</p>
  <p>Please Join the meeting again on a laptop or desktop computer.</p>
</body>
</html>
