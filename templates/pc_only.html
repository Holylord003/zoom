<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PC Only</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    body{
      font-family: Arial, Helvetica, sans-serif;
      background:#f3f3f3;
      text-align:center;
      padding-top:80px;
      color:#333;
      margin:0;
    }
    h1{
      color:#1a73b8;
      font-size:34px;
      margin-bottom:20px;
    }
    p{
      font-size:20px;
      margin:8px 0;
    }
    .button{
      display:inline-block;
      padding:14px 28px;
      margin-top:24px;
      border:2px solid #1a73b8;
      border-radius:35px;
      text-decoration:none;
      color:#1a73b8;
      background:white;
      font-size:18px;
    }
    .button:hover{
      background:#f0f8ff;
    }
  </style>
</head>
<body>
  <h1>This Zoom app is for PC only</h1>
  <p>Sorry, this installer is supported only on Windows computers.</p>
  <p>If you’re on a Mac, please open this page on a Windows device.</p>

</html>
